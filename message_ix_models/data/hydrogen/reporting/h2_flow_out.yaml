# yaml file to report concrete hydrogen production OUTPUT energy flows
# (the out| family). Parallel to h2_prod.yaml, but emits literal
# out|<tech>|<commodity> variable names per the EFC stakeholder request
# (data/20260514variables_mapping.xlsx, sheet mapping_clean) — EFC values the
# concrete per-technology flows over the aggregated Secondary Energy| variables.
# var: out -> ACT x output coefficient. Each variable specifies a list of
# filters for genno.operator.select().

var:
  out

iamc_prefix:
  "out|"

unit: EJ/yr

vars:
  # gas
  h2_smr|hydrogen:
    filter:
      {technology: h2_smr, mode: M1, commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_smr

  h2_smr_ccs|hydrogen:
    filter:
      {technology: h2_smr_ccs, mode: M1, commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_smr_ccs

  # coal
  h2_coal|hydrogen:
    filter:
      {technology: h2_coal, mode: M1, commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_coal

  h2_coal_ccs|hydrogen:
    filter:
      {technology: h2_coal_ccs, mode: M1, commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_coal_ccs

  # biomass
  h2_bio|hydrogen:
    filter:
      {technology: h2_bio, mode: M1, commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_bio

  h2_bio_ccs|hydrogen:
    filter:
      {technology: h2_bio_ccs, mode: M1, commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_bio_ccs

  # electricity (electrolysers carry the 7 Yoga meth_h2 split modes)
  h2_elec_alk|hydrogen:
    filter:
      {technology: h2_elec_alk, mode: [M1, feedstock_bic, feedstock_dac, feedstock_fic, fuel_bic, fuel_dac, fuel_fic], commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_elec_alk

  h2_elec_pem|hydrogen:
    filter:
      {technology: h2_elec_pem, mode: [M1, feedstock_bic, feedstock_dac, feedstock_fic, fuel_bic, fuel_dac, fuel_fic], commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_elec_pem

  h2_elec_soe|hydrogen:
    filter:
      {technology: h2_elec_soe, mode: [M1, feedstock_bic, feedstock_dac, feedstock_fic, fuel_bic, fuel_dac, fuel_fic], commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_elec_soe

  # electric pyrolysis (turquoise). NOTE: absent from mapping_clean out| list;
  # added here because it is a genuine hydrogen producer in the scenario.
  h2_pyro_elec|hydrogen:
    filter:
      {technology: h2_pyro_elec, mode: M1, commodity: hydrogen, level: secondary}
    original_unit: GWa
    short:
      out_h2_pyro
